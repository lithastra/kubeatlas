<!-- ============================================================
     Local icon sprite for KubeAtlas. Cartography line art: 1.5px
     stroke, currentColor, square caps and round line joins.
     Consumers reference symbols by id via <use href="#icon-id"/>.
     The sprite is intentionally tiny — only the icons in current
     use are present. Add more as features need them; do not import
     a third-party icon library.
     ============================================================ -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="atlas-icon-compass" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="round">
    <circle cx="8" cy="8" r="6.25"/>
    <path d="M11 5 8.5 10.5 5 12l1.5-3.5L11 5z" fill="currentColor"/>
  </symbol>
  <symbol id="atlas-icon-search" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="round">
    <circle cx="7" cy="7" r="4.5"/>
    <path d="m10.25 10.25 3.25 3.25"/>
  </symbol>
  <symbol id="atlas-icon-settings" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="round">
    <circle cx="8" cy="8" r="2"/>
    <path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M3.4 12.6l1.4-1.4M11.2 4.8l1.4-1.4"/>
  </symbol>
  <symbol id="atlas-icon-close" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="round">
    <path d="m3.5 3.5 9 9M12.5 3.5l-9 9"/>
  </symbol>
  <symbol id="atlas-icon-info" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="round">
    <circle cx="8" cy="8" r="6.25"/>
    <path d="M8 7v4"/>
    <circle cx="8" cy="5" r="0.75" fill="currentColor" stroke="none"/>
  </symbol>
  <symbol id="atlas-icon-menu" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square">
    <path d="M2.5 4h11M2.5 8h11M2.5 12h11"/>
  </symbol>
  <symbol id="atlas-icon-chevron-down" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="round">
    <path d="m4 6 4 4 4-4"/>
  </symbol>
  <symbol id="atlas-icon-chevron-right" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="round">
    <path d="m6 4 4 4-4 4"/>
  </symbol>
  <!-- Status redundancy marks: each pairs with a colour token and
       carries the same information without it (a11y §1.2). -->
  <symbol id="atlas-icon-status-healthy" viewBox="0 0 16 16" fill="currentColor">
    <circle cx="8" cy="8" r="3"/>
  </symbol>
  <symbol id="atlas-icon-status-warning" viewBox="0 0 16 16" fill="currentColor">
    <path d="M8 3 13.5 12.5h-11z"/>
  </symbol>
  <symbol id="atlas-icon-status-error" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
    <path d="m4 4 8 8M12 4l-8 8"/>
  </symbol>
  <symbol id="atlas-icon-status-orphan" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square">
    <path d="M5.5 5.5h-1a3 3 0 0 0 0 6h1M10.5 10.5h1a3 3 0 0 0 0-6h-1"/>
    <path d="m4 12 8-8"/>
  </symbol>
  <symbol id="atlas-icon-status-unknown" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="round">
    <path d="M5.5 6a2.5 2.5 0 1 1 4 2c-.5.5-1.5 1-1.5 2"/>
    <circle cx="8" cy="12" r="0.75" fill="currentColor" stroke="none"/>
  </symbol>
  <symbol id="atlas-icon-status-deleted" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square">
    <path d="M3 8h10" stroke-dasharray="3 2"/>
  </symbol>
</svg>
