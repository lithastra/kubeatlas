# PetClinic-shaped Phase 0 verification fixture.
#
# This manifest exercises every Phase 0 resource kind and edge type so
# `test/verify/phase0.sh` has something to assert against. It is small
# (single-namespace, single-tenant) and uses minimal images so it fits
# comfortably in any small cluster (kind / k3s / Docker Desktop /
# managed K8s — anything you control is fine).
#
# Resource kinds (16):
#   Namespace, Pod, Deployment, ReplicaSet (auto), StatefulSet,
#   DaemonSet, Job, CronJob, Service, Ingress, ConfigMap, Secret,
#   PersistentVolumeClaim, ServiceAccount, Gateway, HTTPRoute
#
# Edge types (8):
#   OWNS, USES_CONFIGMAP, USES_SECRET, MOUNTS_VOLUME, SELECTS,
#   USES_SERVICEACCOUNT, ROUTES_TO, ATTACHED_TO
#
# Prerequisites:
#   - Any Kubernetes cluster you control with a default StorageClass
#     (kind ships "standard" via local-path-provisioner; managed
#     clusters typically come with one already).
#   - Envoy Gateway installed (provides Gateway / HTTPRoute CRDs).
#   - An Ingress controller (Traefik recommended) for `Ingress`.
---
apiVersion: v1
kind: Namespace
metadata:
  name: petclinic
  labels:
    app.kubernetes.io/part-of: petclinic
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: petclinic-sa
  namespace: petclinic
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: petclinic
data:
  log_level: "info"
  feature_flag_x: "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: shared-config
  namespace: petclinic
data:
  shared_url: "http://example.local"
---
apiVersion: v1
kind: Secret
metadata:
  name: db-password
  namespace: petclinic
type: Opaque
stringData:
  password: "changeme"
---
apiVersion: v1
kind: Secret
metadata:
  name: tls-cert
  namespace: petclinic
type: Opaque
stringData:
  cert: "fake-cert-bytes"
---
# Standalone PVC mounted by the api Deployment.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-pvc
  namespace: petclinic
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
# api: Deployment exercising USES_CONFIGMAP (envFrom),
# USES_SECRET (envFrom + volume), MOUNTS_VOLUME (PVC),
# USES_SERVICEACCOUNT (explicit), and is later SELECTed by api-svc.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: petclinic
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      serviceAccountName: petclinic-sa
      containers:
        - name: web
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: db-password
          env:
            - name: SHARED_URL
              valueFrom:
                configMapKeyRef:
                  name: shared-config
                  key: shared_url
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tls
              mountPath: /etc/tls
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: data-pvc
        - name: tls
          secret:
            secretName: tls-cert
---
# api-svc: Service that SELECTs the api Pods by label.
apiVersion: v1
kind: Service
metadata:
  name: api-svc
  namespace: petclinic
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 80
      targetPort: 80
---
# postgres: StatefulSet with its own PVC template for MOUNTS_VOLUME.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: petclinic
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      name: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: petclinic
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: nginx:1.27-alpine  # placeholder; we just need a healthy pod
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-password
                  key: password
          ports:
            - containerPort: 80
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 100Mi
---
# fluentbit: DaemonSet so we exercise that workload kind.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluentbit
  namespace: petclinic
spec:
  selector:
    matchLabels:
      app: fluentbit
  template:
    metadata:
      labels:
        app: fluentbit
    spec:
      containers:
        - name: fluentbit
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
# migrate: standalone Job. Runs forever so kubectl-wait sees it Ready.
# Phase 0 fixture only needs the Job *resource* present in the graph;
# the workload is intentionally idle.
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  namespace: petclinic
spec:
  template:
    metadata:
      labels:
        app: migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: busybox:1.36
          command: ["sleep", "infinity"]
---
# db-backup: CronJob scheduled far enough out that no Job is created
# during the fixture's lifetime. The CronJob *resource* is what the
# Phase 0 verifier asserts on; we don't need its pods to be ready.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
  namespace: petclinic
spec:
  schedule: "0 3 1 1 *"   # 03:00 on Jan 1, runs ~yearly
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: busybox:1.36
              command: ["sh", "-c", "echo backup; sleep 5"]
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: db-password
                      key: password
---
# A standalone Pod (not owned by a workload) so the Pod kind appears
# even if the controller hasn't yet materialised api/postgres pods.
apiVersion: v1
kind: Pod
metadata:
  name: solo
  namespace: petclinic
  labels:
    app: solo
spec:
  serviceAccountName: petclinic-sa
  containers:
    - name: c
      image: nginx:1.27-alpine
      ports:
        - containerPort: 80
---
# Classic Ingress -> Service for the ROUTES_TO edge.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-ingress
  namespace: petclinic
spec:
  ingressClassName: traefik
  rules:
    - host: api.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-svc
                port:
                  number: 80
---
# Gateway API: Gateway and HTTPRoute (ATTACHED_TO + ROUTES_TO).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: my-gateway
  namespace: petclinic
spec:
  gatewayClassName: eg
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: web-route
  namespace: petclinic
spec:
  parentRefs:
    - name: my-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: api-svc
          port: 80
