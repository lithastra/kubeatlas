# Default values for kubeatlas.
#
# Phase 1 §2.3 ("Secure defaults are a product promise") locks down five
# things that are NOT individual values you can flip with a single
# `--set`. They're enforced together by values.schema.json:
#
#   1. service.type defaults to ClusterIP and the schema forbids NodePort.
#   2. ingress.enabled defaults to false; flipping it to true requires
#      ingress.acknowledgeNoBuiltinAuth=true (the operator confirming
#      that an external auth layer fronts the Ingress).
#   3. RBAC ClusterRole verbs are hard-coded in the template to
#      [get, list, watch] -- not exposed as values.
#   4. Pod securityContext defaults below.
#   5. The chart never installs a database; persistence stays disabled
#      until Tier 2 (v1.0).
#
# A user who deliberately wants to weaken any of these defaults must
# touch multiple values; that friction is intentional.

replicaCount: 1

image:
  repository: ghcr.io/lithastra/kubeatlas
  # Empty tag -> chart uses .Chart.AppVersion (defined in Chart.yaml).
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

# RBAC. The role's verbs are hard-coded in templates/clusterrole.yaml
# to [get, list, watch] -- not exposed as a value -- so nobody can
# disable the read-only invariant by editing values.yaml.
rbac:
  create: true

# Pod-level security. All five fields are tightened by default; the
# values.schema.json refuses to relax them below the spec's bar.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# Container-level security.
securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  # Schema enum: ClusterIP only. NodePort + LoadBalancer are rejected.
  type: ClusterIP
  port: 80
  # Container port the kubeatlas binary listens on (matches DefaultAddr
  # in pkg/api/server.go).
  containerPort: 8080

ingress:
  # Default off. Flipping to true demands acknowledgeNoBuiltinAuth=true
  # (enforced by values.schema.json's `if/then`).
  enabled: false
  # Operator must set this to true to acknowledge that authentication
  # is provided by the Ingress layer (oauth2-proxy / Pomerium / etc.)
  # before exposing the API.
  acknowledgeNoBuiltinAuth: false
  className: ""
  annotations: {}
  hosts:
    - host: kubeatlas.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Liveness + readiness probes — match the /healthz and /readyz handlers.
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 1
  periodSeconds: 5

# Persistence (Tier 2 / PostgreSQL + Apache AGE).
#
# Default-off so a `helm install kubeatlas oci://...` with no flags
# still gives the zero-config Tier 1 experience the README promises
# (guide §2.3, anti-pattern #10). Setting persistence.enabled=true
# without picking exactly one of {embedded, connection} is rejected
# by values.schema.json — no half-configured Tier 2 deployments.
#
# Two production paths:
#
#   1. Embedded (one-line install): persistence.embedded.enabled=true
#      pulls in the CloudNativePG sub-chart, provisions a single-
#      replica PG cluster running lithastra/postgres-age, and wires
#      KubeAtlas to it via Pod env. Best for evaluation and small
#      single-cluster ops.
#   2. BYO Postgres: persistence.connection.* points at an existing
#      AGE-capable Postgres. RDS / Cloud SQL are NOT supported —
#      they reject shared_preload_libraries=age. Self-hosted PG +
#      AGE 1.6.0 (or newer) is the supported BYO target.
persistence:
  enabled: false

  embedded:
    # When true, the chart renders a CloudNativePG Cluster CRD plus
    # the templates that wire KubeAtlas to it. Requires the cnpg
    # sub-chart (declared in Chart.yaml under "condition" so it is
    # only fetched when this flag is true).
    enabled: false
    # Storage size for the embedded PG PVC. The Cluster CRD's
    # default StorageClass is used unless overridden.
    storageSize: 5Gi
    storageClassName: ""
    # Image pin matches images/postgres-age/Dockerfile and the test
    # bootstrap; bumping AGE / PG means changing all three together.
    image: ghcr.io/lithastra/postgres-age:16-1.6.0
    # Cluster name suffix; final name is "<release>-<suffix>".
    clusterNameSuffix: pg

  connection:
    # Hostname of the BYO Postgres+AGE server. Mutually exclusive
    # with persistence.embedded.enabled — schema rejects setting
    # both. Required when persistence.enabled=true and embedded is
    # off.
    host: ""
    port: 5432
    database: kubeatlas
    user: kubeatlas
    # Plaintext password. Production deployments should set
    # passwordSecretRef instead, which takes precedence and pulls
    # the value from a Kubernetes Secret at Pod start. Embedded
    # mode ignores both and uses the CNPG-managed app secret
    # automatically.
    password: ""
    passwordSecretRef:
      name: ""
      key: password
    sslMode: disable

nodeSelector: {}
tolerations: []
affinity: {}

# Placeholder for the NetworkPolicy template (P1-T19). Default-deny
# inbound; allow only the namespace its Ingress controller runs in.
networkPolicy:
  enabled: true
  ingressNamespaceLabel: ""

# Extra labels applied to every resource the chart renders.
extraLabels: {}
