# Default values for kubeatlas.
#
# Phase 1 §2.3 ("Secure defaults are a product promise") locks down five
# things that are NOT individual values you can flip with a single
# `--set`. They're enforced together by values.schema.json:
#
#   1. service.type defaults to ClusterIP and the schema forbids NodePort.
#   2. ingress.enabled defaults to false; flipping it to true requires
#      ingress.acknowledgeNoBuiltinAuth=true (the operator confirming
#      that an external auth layer fronts the Ingress).
#   3. RBAC ClusterRole verbs are hard-coded in the template to
#      [get, list, watch] -- not exposed as values.
#   4. Pod securityContext defaults below.
#   5. The chart never installs a database; persistence stays disabled
#      until Tier 2 (v1.0).
#
# A user who deliberately wants to weaken any of these defaults must
# touch multiple values; that friction is intentional.

replicaCount: 1

image:
  repository: ghcr.io/lithastra/kubeatlas
  # Empty tag -> chart uses .Chart.AppVersion (defined in Chart.yaml).
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

# RBAC. The role's verbs are hard-coded in templates/clusterrole.yaml
# to [get, list, watch] -- not exposed as a value -- so nobody can
# disable the read-only invariant by editing values.yaml.
rbac:
  create: true

# Pod-level security. All five fields are tightened by default; the
# values.schema.json refuses to relax them below the spec's bar.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# Container-level security.
securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  # Schema enum: ClusterIP only. NodePort + LoadBalancer are rejected.
  type: ClusterIP
  port: 80
  # Container port the kubeatlas binary listens on (matches DefaultAddr
  # in pkg/api/server.go).
  containerPort: 8080

ingress:
  # Default off. Flipping to true demands acknowledgeNoBuiltinAuth=true
  # (enforced by values.schema.json's `if/then`).
  enabled: false
  # Operator must set this to true to acknowledge that authentication
  # is provided by the Ingress layer (oauth2-proxy / Pomerium / etc.)
  # before exposing the API.
  acknowledgeNoBuiltinAuth: false
  className: ""
  annotations: {}
  hosts:
    - host: kubeatlas.local
      paths:
        - path: /
          pathType: Prefix
  # User-managed TLS: each entry is rendered as-is into
  # ingress.spec.tls. Mutually exclusive with certManager.enabled
  # (schema rejects setting both).
  tls: []
  # cert-manager TLS (P2-T21 / F-121). Off by default so the
  # zero-config install stays plain HTTP. When enabled the chart
  # renders a Certificate (and a SelfSigned Issuer for the
  # `selfsigned` mode) and auto-injects the resulting Secret into
  # ingress.spec.tls.
  certManager:
    enabled: false
    # selfsigned          → chart creates a SelfSigned Issuer.
    # letsencrypt-staging → chart references issuerName, does not
    #                       create an Issuer (use this for testing).
    # letsencrypt-prod    → same shape as staging, hits the
    #                       production ACME endpoint.
    # custom              → chart references issuerName/issuerKind
    #                       verbatim.
    issuer: selfsigned
    # The Issuer / ClusterIssuer kubeatlas references. Defaulted by
    # the resolver in _helpers.tpl when the issuer mode is not
    # `custom`; required when issuer=custom.
    issuerName: ""
    # Issuer or ClusterIssuer. ClusterIssuer is the natural choice
    # for letsencrypt-* (typically cluster-wide). Schema-validated.
    issuerKind: ""
    # Certificate duration / renewBefore knobs. Cert-manager defaults
    # are sane; surface these for operators who need RFC-style short-
    # lived certs.
    duration: ""
    renewBefore: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Liveness + readiness probes — match the /healthz and /readyz handlers.
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 1
  periodSeconds: 5

# Persistence (Tier 2 / PostgreSQL + Apache AGE).
#
# Default-off so a `helm install kubeatlas oci://...` with no flags
# still gives the zero-config Tier 1 experience the README promises
# (guide §2.3, anti-pattern #10). Setting persistence.enabled=true
# without picking exactly one of {embedded, connection} is rejected
# by values.schema.json — no half-configured Tier 2 deployments.
#
# Two production paths:
#
#   1. Embedded (one-line install): persistence.embedded.enabled=true
#      pulls in the CloudNativePG sub-chart, provisions a single-
#      replica PG cluster running lithastra/postgres-age, and wires
#      KubeAtlas to it via Pod env. Best for evaluation and small
#      single-cluster ops.
#   2. BYO Postgres: persistence.connection.* points at an existing
#      AGE-capable Postgres. RDS / Cloud SQL are NOT supported —
#      they reject shared_preload_libraries=age. Self-hosted PG +
#      AGE 1.6.0 (or newer) is the supported BYO target.
persistence:
  enabled: false

  embedded:
    # When true, the chart renders a CloudNativePG Cluster CRD plus
    # the templates that wire KubeAtlas to it. Requires the cnpg
    # sub-chart (declared in Chart.yaml under "condition" so it is
    # only fetched when this flag is true).
    enabled: false
    # Storage size for the embedded PG PVC. The Cluster CRD's
    # default StorageClass is used unless overridden.
    storageSize: 5Gi
    storageClassName: ""
    # Image pin matches images/postgres-age/Dockerfile and the test
    # bootstrap; bumping AGE / PG means changing all three together.
    #
    # CNPG's spec.imageName webhook validates that the tag parses as
    # a Postgres version (e.g. "16" / "16.6"). Apache AGE publishes
    # tags as "release_PG16_1.6.0" which the webhook rejects, so the
    # canonical path is to publish ghcr.io/lithastra/postgres-age
    # with a PG-version-shaped tag once the release pipeline lands.
    # Until then operators can re-tag locally:
    #
    #   docker tag apache/age:release_PG16_1.6.0 local-postgres-age:16.6
    #   helm install ... --set persistence.embedded.image=local-postgres-age:16.6
    #
    # The default below points at the lithastra/ image; flipping it
    # back to apache/age will trip the webhook unless the user
    # disables imageName validation (not recommended).
    image: ghcr.io/lithastra/postgres-age:16.6
    # Cluster name suffix; final name is "<release>-<suffix>".
    clusterNameSuffix: pg

  connection:
    # Hostname of the BYO Postgres+AGE server. Mutually exclusive
    # with persistence.embedded.enabled — schema rejects setting
    # both. Required when persistence.enabled=true and embedded is
    # off.
    host: ""
    port: 5432
    database: kubeatlas
    user: kubeatlas
    # Plaintext password. Production deployments should set
    # passwordSecretRef instead, which takes precedence and pulls
    # the value from a Kubernetes Secret at Pod start. Embedded
    # mode ignores both and uses the CNPG-managed app secret
    # automatically.
    password: ""
    passwordSecretRef:
      name: ""
      key: password
    sslMode: disable

nodeSelector: {}
tolerations: []
affinity: {}

# Placeholder for the NetworkPolicy template (P1-T19). Default-deny
# inbound; allow only the namespace its Ingress controller runs in.
networkPolicy:
  enabled: true
  ingressNamespaceLabel: ""

# Rule packs (Phase 2 / Tier 2 rego engine). Each pack governs a
# slice of CRDs that KubeAtlas does not have a built-in extractor
# for: OpenShift Routes / DeploymentConfigs / etc. live in the
# embedded openshift pack, cert-manager and other community packs
# arrive via the OCI extras list (P2-T13).
rulePacks:
  # auto: detect route.openshift.io at startup and load the
  #       embedded openshift pack only when present.
  # true: force-load the pack (kind cluster + raw Route YAML, for
  #       rule-pack development).
  # false: never load (when an operator wants to swap in a fork
  #       via extras).
  openshift: auto

  # Additional rule packs to load from OCI artifacts. Each entry
  # is an OCI ref ("ghcr.io/lithastra/rules/<pack>:<version>" or
  # "oci://<host>/...:<version>"). Loaded after built-ins and the
  # OpenShift pack (if any). Pinning a semver tag is mandatory —
  # ":latest" trips the loader's anti-pattern guard.
  #
  # Example:
  #   rulePacks:
  #     extras:
  #       - oci://ghcr.io/lithastra/rules/cert-manager:0.1.0
  #       - oci://ghcr.io/lithastra/rules/argo:0.2.0
  extras: []

  # Sigstore (cosign) signature verification for OCI rule packs
  # (invariant 2.9). When true, every pack in `extras` must carry a
  # valid keyless signature or the pod fails to start — verification
  # failure is fatal, never "warn and continue".
  #
  # Default true from v1.2 (it shipped false in v1.1 so existing
  # installs could migrate gradually). An air-gapped install with no
  # path to the Sigstore trust root must set this false explicitly —
  # the only supported air-gap mode.
  verifySignature: true

  # Trusted signing identities for THIRD-PARTY packs — packs not
  # published under ghcr.io/lithastra (those are pinned to the
  # Lithastra release identity and cannot be widened here). Each
  # entry is a keyless Fulcio identity. Only consulted when
  # verifySignature is true.
  #
  # Example:
  #   rulePacks:
  #     trustedIdentities:
  #       - issuer: https://token.actions.githubusercontent.com
  #         identityRegexp: ^https://github\.com/acme/rules/.+@refs/tags/.+$
  trustedIdentities: []

# Historical snapshots (F-111 / Tier 2 only).
#
# When enabled, KubeAtlas records every resource add/update/delete
# into an append-only PostgreSQL event stream, so the diff endpoint
# can answer "what changed in the last 5 minutes". The writer is
# async — it never blocks the informer's hot path.
#
# Requires persistence.enabled=true: the event stream is a Tier 2
# table. values.schema.json rejects snapshots.enabled=true without
# persistence.enabled=true. The memory backend's small ring buffer
# is a test stub, not a Tier 1 feature (guide invariant 2.2).
snapshots:
  enabled: false
  # Writer queue capacity. The informer enqueues here; worker
  # goroutines drain into PG. Overflow (oldest event dropped) only
  # happens under sustained burst beyond what the workers absorb.
  queueSize: 10000
  # Concurrent writer goroutines draining the queue into PostgreSQL.
  workers: 4
  # How long to keep resource_events rows. An hourly retention
  # worker prunes anything older. Accepts a day suffix ("7d",
  # "30d") or any Go duration ("24h", "168h"). A typo fails the
  # pod at startup rather than silently defaulting.
  retention: 7d
  # Cron schedule for the periodic full-sync snapshot CronJob.
  # Each tick records one snapshot_meta marker. Standard 5-field
  # cron syntax.
  fullSyncSchedule: "*/5 * * * *"

# Multi-cluster federation (F-201, v1.3). When enabled, KubeAtlas
# attaches an informer to every cluster whose kubeconfig is in the
# named Secret and tags every Resource with its ClusterID. The
# federation aggregator (P3-T22) then serves a merged view.
#
# Default off — single-cluster install is the v1.0/v1.1/v1.2 path
# and stays the zero-config baseline.
multicluster:
  enabled: false
  # Name of the Secret holding the member kubeconfigs. Each key in
  # the Secret's data map is treated as the cluster name (the
  # ClusterID), each value as that cluster's kubeconfig YAML. The
  # Secret must live in the release namespace.
  #
  # Names must not contain ':' or '/' — they appear verbatim in the
  # ClusterID prefix on every Resource ID. Cluster startup is
  # best-effort: a single bad kubeconfig is logged and skipped, the
  # others still attach.
  kubeconfigSecret: ""

# Extra labels applied to every resource the chart renders.
extraLabels: {}

# Opt-in anonymous usage telemetry. OFF by default — you must
# explicitly enable it. When on, KubeAtlas sends coarse,
# non-identifying data once a day (version, K8s version, OS/arch,
# tier, a resource-count bucket, enabled rule-pack names, cluster
# counts) to https://telemetry.kubeatlas.dev. It never sends resource
# names, namespaces, label values, IPs, or any cross-session
# identifier. The endpoint is hard-coded in the binary and not
# configurable. Preview exactly what would be sent at
# /api/v1/telemetry/preview. See docs/concepts/telemetry-schema.md.
telemetry:
  enabled: false

# OpenTelemetry trace overlay (F-204, v1.5). When enabled, KubeAtlas
# runs an OTLP/gRPC receiver that ingests trace spans and persists
# them to a PostgreSQL table, so a later overlay can show observed
# runtime call edges alongside the declared dependency graph.
#
# Tier 2 only — spans persist to PostgreSQL, so otel.enabled requires
# persistence.enabled=true (the values schema rejects otel-without-
# persistence). Default off; when off there is no receiver, no
# listener, and zero overhead.
#
# The receiver listens on its OWN gRPC port (4317 by convention),
# separate from the 8080 HTTP API, exposed via its own ClusterIP
# Service so the two can be network-policied independently.
otel:
  enabled: false
  receiver:
    # OTLP/gRPC listen port. Kept off the HTTP API port on purpose.
    port: 4317
    # Span-queue capacity. The receiver enqueues here; writer
    # goroutines drain into PG. A full queue drops spans (counted as
    # kubeatlas_otel_dropped_total) rather than blocking the gRPC
    # caller or the core graph path.
    bufferSize: 4096
  # How long to keep otel_spans rows. An hourly retention worker
  # prunes anything older. Accepts a day suffix ("7d") or any Go
  # duration ("168h"). A typo fails the pod at startup rather than
  # silently defaulting.
  retention: 7d
