suite: rbac is read-only
templates:
  - clusterrole.yaml
  - clusterrolebinding.yaml
  - serviceaccount.yaml
tests:
  - it: every ClusterRole rule's verbs are exactly [get, list, watch]
    template: clusterrole.yaml
    asserts:
      - isKind:
          of: ClusterRole
      # Each rule's verbs slice must be exactly the read-only triple.
      # Asserting `equal` on every rule's verbs catches any future
      # write verb additions.
      - equal:
          path: rules[0].verbs
          value: ["get", "list", "watch"]
      - equal:
          path: rules[1].verbs
          value: ["get", "list", "watch"]
      - equal:
          path: rules[2].verbs
          value: ["get", "list", "watch"]
      - equal:
          path: rules[3].verbs
          value: ["get", "list", "watch"]
      - equal:
          path: rules[4].verbs
          value: ["get", "list", "watch"]

  - it: ClusterRoleBinding points at the chart's ServiceAccount
    template: clusterrolebinding.yaml
    asserts:
      - isKind:
          of: ClusterRoleBinding
      - equal:
          path: subjects[0].kind
          value: ServiceAccount
      - equal:
          path: subjects[0].name
          value: RELEASE-NAME-kubeatlas

  - it: ServiceAccount is created by default
    template: serviceaccount.yaml
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME-kubeatlas
