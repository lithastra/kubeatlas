suite: secure defaults
templates:
  - service.yaml
  - deployment.yaml
tests:
  - it: Service is ClusterIP by default
    template: service.yaml
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.type
          value: ClusterIP

  - it: NodePort is rejected by the values schema
    set:
      service.type: NodePort
    asserts:
      - failedTemplate:
          errorPattern: "service\\.type does not match"

  - it: persistence.enabled=true without connection.host is rejected
    template: deployment.yaml
    set:
      persistence.enabled: true
    asserts:
      - failedTemplate:
          errorPattern: "host"

  - it: persistence.enabled=true with connection.host passes the schema
    template: deployment.yaml
    set:
      persistence.enabled: true
      persistence.connection.host: pg.example
    asserts:
      - notFailedTemplate: {}

  - it: persistence off (default) injects no PGCONN env
    template: deployment.yaml
    asserts:
      # P2-T11 always renders KUBEATLAS_RULEPACK_OPENSHIFT, so the
      # env block is no longer empty. The Tier 2 vars stay absent
      # though — that's the actual invariant this test guards.
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: PGCONN
          any: true
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: KUBEATLAS_BACKEND
          any: true
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KUBEATLAS_RULEPACK_OPENSHIFT
            value: auto

  - it: persistence on injects KUBEATLAS_BACKEND and PGCONN env
    template: deployment.yaml
    set:
      persistence.enabled: true
      persistence.connection.host: pg.example
      persistence.connection.password: hunter2
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KUBEATLAS_BACKEND
            value: postgres
      # PGCONN uses K8s env-var dependency expansion ($(VAR) →
      # value of VAR at container start). The literal Deployment
      # manifest carries the unexpanded template; the kubelet
      # substitutes at Pod creation.
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PGCONN
            value: postgres://$(PGUSER):$(PGPASSWORD)@$(PGHOST):$(PGPORT)/$(PGDATABASE)?sslmode=$(PGSSLMODE)

  - it: weakening readOnlyRootFilesystem is rejected
    template: deployment.yaml
    set:
      securityContext.readOnlyRootFilesystem: false
    asserts:
      - failedTemplate:
          errorPattern: "securityContext\\.readOnlyRootFilesystem does not match"

  - it: ingress.enabled=true without acknowledgement is rejected
    template: deployment.yaml
    set:
      ingress.enabled: true
    asserts:
      - failedTemplate:
          errorPattern: "ingress\\.acknowledgeNoBuiltinAuth does not match"

  - it: rulePacks.openshift=true is honoured
    template: deployment.yaml
    set:
      rulePacks.openshift: "true"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KUBEATLAS_RULEPACK_OPENSHIFT
            value: "true"

  - it: rulePacks.openshift=false is honoured
    template: deployment.yaml
    set:
      rulePacks.openshift: "false"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KUBEATLAS_RULEPACK_OPENSHIFT
            value: "false"

  - it: rulePacks.openshift bogus value is rejected by the schema
    template: deployment.yaml
    set:
      rulePacks.openshift: "yes-please"
    asserts:
      - failedTemplate:
          errorPattern: "rulePacks/openshift|enum|oneOf"

  - it: rulePacks.openshift bare boolean true is accepted (Helm --set ergonomics)
    template: deployment.yaml
    set:
      rulePacks.openshift: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KUBEATLAS_RULEPACK_OPENSHIFT
            value: "true"

  - it: rulePacks.openshift bare boolean false is accepted (sprig default trap avoided)
    template: deployment.yaml
    set:
      rulePacks.openshift: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KUBEATLAS_RULEPACK_OPENSHIFT
            value: "false"

  - it: ingress.enabled=true with acknowledgement passes the schema
    template: deployment.yaml
    set:
      ingress.enabled: true
      ingress.acknowledgeNoBuiltinAuth: true
    asserts:
      - notFailedTemplate: {}
