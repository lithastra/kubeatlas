suite: deployment defaults
templates:
  - deployment.yaml
tests:
  - it: renders the Deployment with the chart fullname
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-kubeatlas

  - it: defaults image tag to the chart's appVersion
    # Assert the *contract* (image points at our repo with some
    # version tag), not a literal version string. Pinning a literal
    # made the test fail every release bump even though the
    # templated image was correct. helm-unittest's `value:` isn't
    # Go-templated, so we match the repo prefix + any semver-shaped
    # tag with matchRegex instead.
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^ghcr\\.io/lithastra/kubeatlas:[0-9]+\\.[0-9]+\\.[0-9]+(-[0-9A-Za-z.-]+)?$"

  - it: hard-pins runAsNonRoot at the pod level
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true

  - it: hard-pins the four container security fields
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: ALL

  - it: probes hit /healthz and /readyz on the http port
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /healthz
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /readyz

  - it: container exposes a writable /tmp emptyDir on the read-only rootfs
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tmp
            emptyDir: {}
