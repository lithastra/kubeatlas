apiVersion: v2
name: kubeatlas
description: Kubernetes resource dependency graph
type: application
version: 0.1.0
appVersion: "0.1.0"
kubeVersion: ">=1.26.0-0"
# Optional CloudNativePG dependency. The conditional means
# `helm dependency update` only fetches it when the user opts in
# via persistence.embedded.enabled=true; default installs are
# unaffected and continue to ship a single-chart .tgz (guide §2.3,
# anti-pattern #10: Tier 2 is opt-in).
dependencies:
  - name: cloudnative-pg
    version: "0.22.x"
    repository: "https://cloudnative-pg.io/charts"
    condition: persistence.embedded.enabled
keywords:
  - kubernetes
  - dependency-graph
  - visualization
  - sre
  - devops
home: https://kubeatlas.lithastra.com
sources:
  - https://github.com/lithastra/kubeatlas
maintainers:
  - name: KubeAtlas Maintainers
    url: https://github.com/lithastra/kubeatlas/blob/main/MAINTAINERS.md
icon: https://docs.kubeatlas.lithastra.com/img/logo.svg
annotations:
  artifacthub.io/category: networking
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: Source
      url: https://github.com/lithastra/kubeatlas
    - name: Documentation
      url: https://docs.kubeatlas.lithastra.com
