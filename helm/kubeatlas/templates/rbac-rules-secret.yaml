{{- /*
F-206 multi-cluster RBAC visibility (P5-T7). Renders the configured
token -> visible-cluster rules into a Secret mounted into the pod as
rules.json. Only emitted when at least one rule is set; an empty
multicluster.rbac.rules leaves the federation surface open to every
caller, exactly as v1.4. Tokens are secret material — supply them from a
secret values source, never a committed values file.
*/ -}}
{{- if .Values.multicluster.rbac.rules }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubeatlas.fullname" . }}-rbac-rules
  labels:
    {{- include "kubeatlas.labels" . | nindent 4 }}
type: Opaque
stringData:
  rules.json: {{ .Values.multicluster.rbac.rules | toJson | quote }}
{{- end }}
