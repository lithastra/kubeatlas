{{- if .Values.networkPolicy.enabled -}}
# Default-deny inbound. When .Values.networkPolicy.ingressNamespaceLabel
# is set we additionally allow traffic from the namespace whose
# `kubernetes.io/metadata.name` matches that label — typically the
# Ingress controller's own namespace ("ingress-nginx",
# "ingress-traefik", "envoy-gateway-system", etc.).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubeatlas.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeatlas.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kubeatlas.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    {{- if .Values.networkPolicy.ingressNamespaceLabel }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespaceLabel | quote }}
      ports:
        - port: http
          protocol: TCP
    {{- else }}
    # No allowed source namespace configured; the policy denies all
    # inbound traffic. Override .Values.networkPolicy.ingressNamespaceLabel
    # to permit a specific Ingress controller namespace.
    []
    {{- end }}
{{- end }}
