{{- if .Values.rbac.create -}}
# Cluster-wide read-only access. The verbs are HARD-CODED to
# [get, list, watch] — they are not exposed as a Helm value. KubeAtlas
# is read-only, always (Phase 1 §2.3 promise #3); changing this list
# changes the security model and must go through a code review.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubeatlas.fullname" . }}
  labels:
    {{- include "kubeatlas.labels" . | nindent 4 }}
rules:
  # Core API group resources we watch.
  - apiGroups: [""]
    resources:
      - namespaces
      - pods
      - services
      - configmaps
      - secrets
      - persistentvolumeclaims
      - serviceaccounts
    verbs: ["get", "list", "watch"]
  # apps/v1
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  # batch/v1
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  # networking.k8s.io
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  # gateway.networking.k8s.io (optional — controller may not be installed)
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gateways
      - httproutes
    verbs: ["get", "list", "watch"]
  # apiextensions.k8s.io — Phase 2 P2-T10 dynamic CRD discovery.
  # Watching CRDs themselves lets pkg/crd.Discovery (un)register
  # per-CRD informers as new operators land at runtime. We also need
  # list/watch on every CRD-defined resource the chart targets, which
  # we deliberately do NOT enumerate here: the dynamic informer needs
  # cluster-wide read across user-installed CRDs (cert-manager,
  # OpenShift, Argo, etc) and listing them upfront in the chart would
  # mean a Helm upgrade for every new operator. The wildcard rule
  # below stays read-only and matches the §2.3 invariant — verbs are
  # still get/list/watch only.
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  # Read-only access to every namespaced resource that lands as a CR.
  # Required for pkg/crd.Discovery's per-CRD dynamic informers; safe
  # because verbs are read-only.
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
{{- end }}
