{{- if .Values.ingress.enabled -}}
{{- /*
Ingress is disabled by default and the values.schema.json forbids
enabling it without ingress.acknowledgeNoBuiltinAuth=true. The
acknowledgement is the operator promising they have an authentication
layer in front (oauth2-proxy / Pomerium / Cloudflare Access / SSO at
the controller).
*/ -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kubeatlas.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeatlas.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "kubeatlas.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
