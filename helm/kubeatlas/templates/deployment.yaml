apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubeatlas.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeatlas.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubeatlas.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubeatlas.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "kubeatlas.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.persistence.enabled }}
      # wait-for-pg blocks the main container until Postgres is
      # accepting connections (guide P2-T6: pg_isready loop in
      # init container, NOT in the kubeatlas main process). The
      # postgres-age image bundles pg_isready, so we reuse it here
      # rather than pulling a second client image.
      initContainers:
        - name: wait-for-pg
          image: {{ .Values.persistence.embedded.image | quote }}
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              i=0
              until pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE"; do
                i=$((i+1))
                if [ "$i" -ge 60 ]; then
                  echo "wait-for-pg: timeout after 60s" >&2
                  exit 1
                fi
                sleep 1
              done
          env:
            {{- include "kubeatlas.pgEnv" . | nindent 12 }}
      {{- end }}
      containers:
        - name: kubeatlas
          image: {{ include "kubeatlas.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.containerPort }}
              protocol: TCP
            {{- if .Values.otel.enabled }}
            # F-204 OTLP/gRPC receiver. Separate from the HTTP API
            # port so the two surfaces can be network-policied apart.
            - name: otel-grpc
              containerPort: {{ .Values.otel.receiver.port | default 4317 }}
              protocol: TCP
            {{- end }}
          env:
            # rulePacks.openshift selects the OpenShift detector
            # mode (auto | true | false). Accepts string OR bool
            # (Helm's --set parses bare true/false as bool unless
            # --set-string is used). printf "%v" renders both
            # uniformly, and we cannot use sprig's `default` here
            # because it treats bool `false` as empty and would
            # silently substitute "auto".
            - name: KUBEATLAS_RULEPACK_OPENSHIFT
              value: {{ printf "%v" .Values.rulePacks.openshift | quote }}
            {{- with .Values.rulePacks.extras }}
            # rulePacks.extras → comma-separated env var the binary
            # reads in main.go's rulePackRefs(). Operators can also
            # pass --rule-pack repeatedly on the command line; the
            # two are unioned.
            - name: KUBEATLAS_RULE_PACKS
              value: {{ join "," . | quote }}
            {{- end }}
            {{- if .Values.rulePacks.verifySignature }}
            # rulePacks.verifySignature → Sigstore signature
            # verification for OCI packs. When "true" a pack whose
            # signature does not verify aborts startup (invariant 2.9).
            - name: KUBEATLAS_RULEPACK_VERIFY_SIGNATURE
              value: "true"
            {{- end }}
            {{- with .Values.rulePacks.trustedIdentities }}
            # rulePacks.trustedIdentities → JSON array of keyless
            # Fulcio identities trusted for third-party packs. Only
            # consulted when verifySignature is true.
            - name: KUBEATLAS_RULEPACK_TRUSTED_IDENTITIES
              value: {{ toJson . | quote }}
            {{- end }}
          {{- if .Values.persistence.enabled }}
            - name: KUBEATLAS_BACKEND
              value: "postgres"
            {{- include "kubeatlas.pgEnv" . | nindent 12 }}
            # PGCONN uses K8s env-var dependency expansion: $(PGPASSWORD)
            # is substituted at container start with whatever the
            # PGPASSWORD env var holds — including values pulled from
            # a Secret via secretKeyRef. This keeps secret material
            # out of the rendered Deployment manifest.
            - name: PGCONN
              value: "postgres://$(PGUSER):$(PGPASSWORD)@$(PGHOST):$(PGPORT)/$(PGDATABASE)?sslmode=$(PGSSLMODE)"
            {{- if .Values.snapshots.enabled }}
            # F-111 snapshot writer (P3-T3). values.schema.json
            # guarantees snapshots.enabled implies persistence.enabled
            # (invariant 2.2), so these only render alongside the PG
            # env above — the writer needs the Tier 2 event table.
            - name: KUBEATLAS_SNAPSHOTS_ENABLED
              value: "true"
            - name: KUBEATLAS_SNAPSHOTS_QUEUE_SIZE
              value: {{ .Values.snapshots.queueSize | quote }}
            - name: KUBEATLAS_SNAPSHOTS_WORKERS
              value: {{ .Values.snapshots.workers | quote }}
            - name: KUBEATLAS_SNAPSHOTS_RETENTION
              value: {{ .Values.snapshots.retention | quote }}
            {{- end }}
            {{- if .Values.otel.enabled }}
            # F-204 OTLP trace receiver. Nested inside persistence.enabled
            # because spans persist to PostgreSQL (Tier 2 only); the
            # values.schema gate guarantees otel.enabled implies
            # persistence.enabled (invariant 2.2 / 2.5).
            - name: KUBEATLAS_OTEL_ENABLED
              value: "true"
            - name: KUBEATLAS_OTEL_GRPC_ADDR
              value: ":{{ .Values.otel.receiver.port | default 4317 }}"
            - name: KUBEATLAS_OTEL_BUFFER_SIZE
              value: {{ .Values.otel.receiver.bufferSize | quote }}
            - name: KUBEATLAS_OTEL_RETENTION
              value: {{ .Values.otel.retention | quote }}
            {{- end }}
          {{- end }}
          {{- if .Values.multicluster.enabled }}
            # F-201 multi-cluster federation (P3-T21). When enabled the
            # binary mounts every kubeconfig in the named Secret and
            # starts one informer per member cluster. The values.schema
            # gate above enforces a non-empty kubeconfigSecret.
            - name: KUBEATLAS_MULTICLUSTER_ENABLED
              value: "true"
            - name: KUBEATLAS_MULTICLUSTER_KUBECONFIG_DIR
              value: /etc/kubeatlas/multicluster
          {{- end }}
          {{- if .Values.multicluster.rbac.rules }}
            # F-206 read-side cluster visibility (P5-T7). The rules Secret
            # (chart-rendered) maps bearer tokens to visible clusters; the
            # process stores only their SHA-256 hashes. Filters the
            # federation surface only — visibility, not credential auth.
            - name: KUBEATLAS_MULTICLUSTER_RBAC_RULES_FILE
              value: /etc/kubeatlas/rbac/rules.json
          {{- end }}
          {{- if .Values.telemetry.enabled }}
            # Opt-in anonymous usage telemetry (default off). The receiver
            # endpoint is hard-coded in the binary and not configurable —
            # operators choose only enabled/disabled. See
            # docs/concepts/telemetry-schema.md for exactly what is sent.
            - name: KUBEATLAS_TELEMETRY_ENABLED
              value: "true"
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          # The container's root filesystem is read-only (per the
          # locked securityContext); a small writable scratch dir
          # gives any future temp-file logic somewhere safe to write.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.multicluster.enabled }}
            - name: multicluster-kubeconfigs
              mountPath: /etc/kubeatlas/multicluster
              readOnly: true
            {{- end }}
            {{- if .Values.multicluster.rbac.rules }}
            - name: rbac-rules
              mountPath: /etc/kubeatlas/rbac
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.multicluster.enabled }}
        - name: multicluster-kubeconfigs
          secret:
            secretName: {{ .Values.multicluster.kubeconfigSecret | quote }}
        {{- end }}
        {{- if .Values.multicluster.rbac.rules }}
        - name: rbac-rules
          secret:
            secretName: {{ include "kubeatlas.fullname" . }}-rbac-rules
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
