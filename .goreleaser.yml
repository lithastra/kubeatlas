version: 2

project_name: kubeatlas

before:
  hooks:
    - go mod tidy
    # web/dist is built by the release.yml "Build web" step before
    # goreleaser runs, then copied into cmd/kubeatlas/web/dist so the
    # //go:embed directive in cmd/kubeatlas/embed.go picks it up. We
    # do NOT npm-install here to avoid double-building and lockfile
    # contention with the workflow.
    - sh -c 'rm -rf cmd/kubeatlas/web/dist && mkdir -p cmd/kubeatlas/web/dist && cp -R web/dist/. cmd/kubeatlas/web/dist/'
    # kubectl-atlas embeds the same bundle so its --local-ui mode can
    # serve the interactive UI from the in-process server.
    - sh -c 'rm -rf cmd/kubectl-atlas/web/dist && mkdir -p cmd/kubectl-atlas/web/dist && cp -R web/dist/. cmd/kubectl-atlas/web/dist/'

builds:
  - id: kubeatlas
    main: ./cmd/kubeatlas
    binary: kubeatlas
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    # embed_web turns on the //go:embed directive in
    # cmd/kubeatlas/embed_release.go; the before-hook above has
    # already copied web/dist into cmd/kubeatlas/web/dist by this
    # point. Default builds omit the tag to keep `go test` and CI
    # lint working without a frontend bundle.
    tags:
      - embed_web
    ldflags:
      - -s -w
      - -X github.com/lithastra/kubeatlas/pkg/version.Version={{.Version}}
      - -X github.com/lithastra/kubeatlas/pkg/version.Commit={{.Commit}}
      - -X github.com/lithastra/kubeatlas/pkg/version.Date={{.Date}}

  # kubectl-atlas is the F-116 kubectl plugin — a client-side entry
  # point that opens the KubeAtlas UI. Unlike the server binary it
  # also ships for windows: the plugin runs on the operator's
  # workstation, not in-cluster. embed_web bundles the Web UI so the
  # --local-ui offline mode can serve it from the in-process server;
  # the before-hook above has already copied web/dist into
  # cmd/kubectl-atlas/web/dist. Version ldflags stamp pkg/version so
  # `kubectl atlas --version` reports the release tag (the binary
  # imports pkg/version solely for that flag).
  - id: kubectl-atlas
    main: ./cmd/kubectl-atlas
    binary: kubectl-atlas
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    tags:
      - embed_web
    ldflags:
      - -s -w
      - -X github.com/lithastra/kubeatlas/pkg/version.Version={{.Version}}
      - -X github.com/lithastra/kubeatlas/pkg/version.Commit={{.Commit}}
      - -X github.com/lithastra/kubeatlas/pkg/version.Date={{.Date}}

archives:
  - id: kubeatlas
    ids: [kubeatlas]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - docs/docs/quick-start.md

  # A separate archive per platform for the kubectl plugin — the
  # Krew manifest (plugins/atlas.yaml) points one entry at each.
  - id: kubectl-atlas
    ids: [kubectl-atlas]
    name_template: "kubectl-atlas_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

# Multi-arch container image. dockers_v2 collapses the previous
# per-arch `dockers:` blocks + the cross-arch `docker_manifests:`
# stitching into one buildx-native definition; goreleaser handles
# the per-platform build + manifest push in a single invocation.
# Replaces the deprecated dockers / docker_manifests pair (the v2
# is the long-term replacement called out by the goreleaser
# deprecation notice).
#
# Schema differences from v1: `images` lists the repos, `tags` the
# templates, and `labels` is a map rather than a list of --label=
# flags. The product of images × tags becomes the published tags.
dockers_v2:
  - id: kubeatlas
    dockerfile: Dockerfile
    images:
      - ghcr.io/lithastra/kubeatlas
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.source: https://github.com/lithastra/kubeatlas
      org.opencontainers.image.licenses: Apache-2.0

changelog:
  use: github
  sort: asc
  groups:
    - title: "Features"
      regexp: '^.*?feat(\([[:alnum:]]+\))??!?:.+$'
      order: 0
    - title: "Bug Fixes"
      regexp: '^.*?fix(\([[:alnum:]]+\))??!?:.+$'
      order: 1
    - title: "Refactors"
      regexp: '^.*?refactor(\([[:alnum:]]+\))??!?:.+$'
      order: 2
    - title: "Documentation"
      regexp: '^.*?docs(\([[:alnum:]]+\))??!?:.+$'
      order: 3
    - title: "Other"
      order: 999
  filters:
    exclude:
      - '^test:'
      - '^chore:'
      - '^style:'

release:
  github:
    owner: lithastra
    name: kubeatlas
  draft: true
  prerelease: auto
  # Body comes from CHANGELOG.md via --release-notes=FILE on the
  # goreleaser CLI (see .github/workflows/release.yml). The release
  # workflow runs `make changelog-extract VERSION=$TAG` first, which
  # writes /tmp/release-notes.md from the matching `## [vX.Y.Z]`
  # section. Keeping the body version-specific stops every release
  # card looking identical — the old static header was the same
  # Phase 1 boilerplate on every tag.
  footer: |
    ---
    **Helm Chart:** `oci://ghcr.io/lithastra/charts/kubeatlas:{{ .Version }}`
    **Container image:** `ghcr.io/lithastra/kubeatlas:{{ .Version }}`
    **Quick start:** https://docs.kubeatlas.lithastra.com/quick-start
    **Security:** https://docs.kubeatlas.lithastra.com/installation/security-warning
